#
# Onboarding screen
#
onboarding_welcome: |
  This SID player requires a copy of the High Voltage SID Collection (HVSC).

  If you already have downloaded and extracted a copy of the HVSC, then please specify the location of your HVSC folder below.

  If you do not have a copy of HVSC, ultraSID can download and install it for you.

#
# Update HVSC screen
#
updateHVSC_welcome: |
  Your copy of the HVSC is outdated.

  Would you like to update to the latest version of the HVSC automatically?

