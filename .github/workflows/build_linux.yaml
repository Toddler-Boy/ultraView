name: Build Linux
on: [push]
jobs:
  build:
    name: Build Linux
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Fix up git URLs
        run: echo -e '[url "https://github.com/"]\n  insteadOf = "git@github.com:"' >> ~/.gitconfig
        shell: bash
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ninja-build clang g++ \
            libasound2-dev libjack-jackd2-dev ladspa-sdk libcurl4-openssl-dev \
            libfreetype-dev libfontconfig1-dev \
            libx11-dev libxcomposite-dev libxcursor-dev libxext-dev \
            libxinerama-dev libxrandr-dev libxrender-dev \
            libwebkit2gtk-4.1-dev libglu1-mesa-dev mesa-common-dev
        shell: bash
      - name: Install CMake 4.3.0
        run: |
          curl -L https://github.com/Kitware/CMake/releases/download/v4.3.0/cmake-4.3.0-linux-x86_64.tar.gz -o cmake.tar.gz
          tar xzf cmake.tar.gz
          echo "$PWD/cmake-4.3.0-linux-x86_64/bin" >> $GITHUB_PATH
        shell: bash
      - name: "Run script"
        run: ./ci/build.sh
        shell: bash
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ultraView-linux
          path: ci/bin/*.deb
          retention-days: 1
